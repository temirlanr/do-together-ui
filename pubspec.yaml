name: do_together
description: Household chores productivity app for 2-person households.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local persistence
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.2.0

  # Calendar
  table_calendar: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.5

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  logger: ^2.3.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
